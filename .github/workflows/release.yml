name: 'Release'
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'windows-latest' # for Windows.
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: install frontend dependencies
        run: npm ci

      - name: build tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: LPL505-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'LPL505 v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload portable executable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ steps.tauri.outputs.appVersion }}"
          TAG="LPL505-v$VERSION"
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            cd src-tauri/target/release
            # compress plain executable
            7z a LPL505-v${VERSION}-portable-windows.zip lpl505.exe
            gh release upload "$TAG" LPL505-v${VERSION}-portable-windows.zip --clobber
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            TARGET="aarch64-apple-darwin"
            cd src-tauri/target/$TARGET/release
            # tauri creates an app bundle. The portable version is the app bundle itself.
            cd bundle/macos
            zip -r LPL505-v${VERSION}-portable-${TARGET}.zip LPL505.app || true
            gh release upload "$TAG" LPL505-v${VERSION}-portable-${TARGET}.zip --clobber || true
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "src-tauri/target/**/LPL505*"
